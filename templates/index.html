<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mask Detection</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        #preview {
            width: 300px;
            margin-top: 20px;
        }

        #result {
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
    <style>
    body {
        font-family: Arial;
        text-align: center;
        margin-top: 100px;

        /* Background Image */
        background-image: url("https://images.unsplash.com/photo-1584036561566-baf8f5f1b144");

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        color: white;
    }

    /* Dark overlay for readability */
    body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: -1;
    }

    #preview {
        width: 300px;
        margin-top: 20px;
        border-radius: 10px;
        border: 2px solid white;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        background-color: #00bcd4;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #0097a7;
    }

    #result {
        font-size: 22px;
        margin-top: 20px;
        font-weight: bold;
    }
</style>
</head>

<body>

    <h1>Mask Detection App</h1>

    <!-- File input -->
    <input type="file" id="imageInput" accept="image/*">

    <br><br>

    <!-- Preview image -->
    <img id="preview" src="" alt="Image preview">

    <br>

    <!-- Button -->
    <button onclick="uploadImage()">Check Mask</button>

    <!-- Result -->
    <div id="result"></div>

    <script>
        const input = document.getElementById("imageInput");
        const preview = document.getElementById("preview");

        // Show preview when image selected
        input.addEventListener("change", function () {
            const file = input.files[0];
            preview.src = URL.createObjectURL(file);
        });

        async function uploadImage() {
            const file = input.files[0];

            if (!file) {
                alert("Please select an image");
                return;
            }

            const formData = new FormData();
            formData.append("image", file);

            try {
                const response = await fetch("https://sharilyn-sensitive-leisha.ngrok-free.dev/predict", {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();

               document.getElementById("result").innerHTML = `
                    <p>${data.result}</p>
                    <img src="${data.image_url}" style="width:400px; margin-top:20px; border-radius:10px; border:2px solid white;">
               `;
            } catch (error) {
                console.error(error);
                alert("Error connecting to server");
            }
        }
    </script>

</body>
</html>
